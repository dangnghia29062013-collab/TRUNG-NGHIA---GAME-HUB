<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đoán Số Bí Mật</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
width:420px;
background:#222;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px #39ff14;
}

h1{
margin-bottom:20px;
color:#39ff14;
}

p{
margin:10px 0;
}

input{
width:120px;
padding:10px;
font-size:20px;
text-align:center;
border:none;
border-radius:8px;
margin-top:15px;
}

button{
margin-top:15px;
padding:10px 20px;
font-size:17px;
border:none;
border-radius:8px;
cursor:pointer;
background:#39ff14;
}

button:hover{
background:#00cc66;
}

#msg{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

#history{
margin-top:15px;
color:#ccc;
}

#gameOver{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.popup{
background:#222;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px red;
}

.popup h2{
color:red;
margin-bottom:15px;
}

.popup button{
background:#39ff14;
}
</style>

</head>
<body>

<div class="box">

<h1>🎲 Đoán Số Bí Mật</h1>

<p>Máy đã chọn một số từ <b>1 - 100</b></p>

<p>Bạn có <span id="life">10</span> lượt</p>

<input type="number" id="guess" min="1" max="100">

<br>

<button onclick="check()">Đoán</button>

<div id="msg"></div>

<div id="history"></div>

</div>

<div id="gameOver">

<div class="popup">

<h2 id="title"></h2>

<p id="text"></p>

<button onclick="restart()">Chơi Lại</button>

</div>

</div>

<script>

let secret=Math.floor(Math.random()*100)+1;

let life=10;

let history=[];

function check(){

let n=parseInt(document.getElementById("guess").value);

if(isNaN(n)) return;

history.push(n);

document.getElementById("history").innerHTML=
"Đã đoán: "+history.join(", ");

if(n==secret){

document.getElementById("title").innerHTML="🎉 CHIẾN THẮNG";

document.getElementById("text").innerHTML=
"Bạn đã đoán đúng số <b>"+secret+"</b>";

document.getElementById("gameOver").style.display="flex";

return;

}

life--;

document.getElementById("life").innerHTML=life;

if(life<=0){

document.getElementById("title").innerHTML="💀 GAME OVER";

document.getElementById("text").innerHTML=
"Số đúng là <b>"+secret+"</b>";

document.getElementById("gameOver").style.display="flex";

return;

}

if(n<secret){

document.getElementById("msg").innerHTML="📈 Hãy đoán lớn hơn";

}else{

document.getElementById("msg").innerHTML="📉 Hãy đoán nhỏ hơn";

}

document.getElementById("guess").value="";
document.getElementById("guess").focus();

}

function restart(){

location.reload();

}

document.getElementById("guess").addEventListener("keydown",function(e){

if(e.key==="Enter") check();

});

</script>

</body>
</html>
