<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>
body{
margin:0;
background:#111;
color:#fff;
font-family:Arial;
text-align:center;
}

canvas{
display:block;
margin:20px auto;
background:#1e1e1e;
border:3px solid #39ff14;
}

button{
padding:10px 20px;
font-size:16px;
margin:10px;
}
#gameOver{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:30px;
border:3px solid #39ff14;
border-radius:15px;
text-align:center;
color:white;
}

#gameOver h1{
color:red;
font-size:50px;
margin-bottom:10px;
}

#gameOver button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
border:none;
background:#39ff14;
color:black;
border-radius:8px;
}
</style>
</head>

<body>

<h1>🐍 Snake Game</h1>

<div>Điểm: <span id="score">0</span></div>

<canvas id="c" width="500" height="500"></canvas>
<div id="gameOver">
    <h1>GAME OVER</h1>

    <p>🏆 Điểm: <span id="finalScore">0</span></p>

    <button onclick="restart()">🔄 Chơi lại</button>
</div>

<br>

<button onclick="restart()">Chơi lại</button>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

let grid=25;

let snake=[{x:10,y:10}];

let dir={x:1,y:0};

let food={x:15,y:15};

let score=0;

document.addEventListener("keydown",e=>{

if(e.key=="ArrowUp")dir={x:0,y:-1};
if(e.key=="ArrowDown")dir={x:0,y:1};
if(e.key=="ArrowLeft")dir={x:-1,y:0};
if(e.key=="ArrowRight")dir={x:1,y:0};

});

function rand(){
return Math.floor(Math.random()*grid);
}

function gameOver(){

document.getElementById("finalScore").innerText = score;

document.getElementById("gameOver").style.display = "block";

clearInterval(loop);

}

function update(){

let head={
x:snake[0].x+dir.x,
y:snake[0].y+dir.y
};

if(
head.x<0||
head.y<0||
head.x>=grid||
head.y>=grid
){
gameOver();
return;
}

for(let s of snake){
if(s.x==head.x&&s.y==head.y){
gameOver();
return;
}
}

snake.unshift(head);

if(head.x==food.x&&head.y==food.y){
score++;
document.getElementById("score").innerText=score;
food={x:rand(),y:rand()};
}else{
snake.pop();
}

}

function draw(){

ctx.fillStyle="#1e1e1e";
ctx.fillRect(0,0,500,500);

ctx.fillStyle="lime";

snake.forEach(s=>{
ctx.fillRect(s.x*20,s.y*20,18,18);
});

ctx.fillStyle="red";

ctx.fillRect(food.x*20,food.y*20,18,18);

}

function loop(){
update();
draw();
}

setInterval(loop,120);

function restart(){
location.reload();
}

</script>

</body>
</html>
